<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - To Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container-auth">
    <div class="auth-box">
      <div class="auth-left">
        <span class="badge">Admin Register</span>
        <h1>Buat Akun Baru</h1>
        <p>Daftarkan akun admin untuk mulai mengelola tugas, deadline, dan status pekerjaan.</p>
      </div>
      <div class="auth-right">
        <form class="auth-form" id="registerForm">
          <h2>Register</h2>
          <p class="subtext">Buat akun To Do List kamu</p>
          <input type="email" id="email" class="form-control" placeholder="Masukkan email" autocomplete="email">
          <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" autocomplete="new-password">
          <button id="registerBtn" class="btn btn-success full" type="submit">Register</button>
          <p class="helper-text">Setelah register, cek inbox atau folder spam untuk verifikasi email.</p>
          <p class="auth-link">Sudah punya akun? <a href="login.html">Login di sini</a></p>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="auth.js"></script>
</body>
</html>
